<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/static/generalstyle.css" />
    <link rel="stylesheet" href="/static/accueil_animal.css" />
    <title>Accueil animal</title>
  </head>
  <header class="site-header">
    <nav class="site-nav">
				<ul>
					<li><a href="/">Accueil</a></li>
					<li><a href="/animaux"">Animaux</a></li>
					<li><a href="/activites">Activites</a></li>
          {% if 'nom_utilisateur' in session %}
            	<li><a href="/compteUtilisateur">Mon Compte</a></li>
          {% else %}
					  <li><a href="/connexion">Connexion</a></li>
          {% endif %}
				</ul>
			</nav>
  </header>
  <body>
    <main class="page page-fiche-animal">
    <h1 class="titre-page">Fiche animal</h1>

    <div id="fiche-animal" class="fiche-animal"></div>
    <ul id="liste-caracteristique" class="liste-caracteristiques"></ul>

    <script>

       const id = {{ id }}; // erreur qui marche quand même (vscode ne détecte pas)
      //possible car id transmis avec la route
      fetch(`/Recup_unique_animal/${id}`)
        .then((response) => response.json())
        .then((data) => {
          const conteneur = document.getElementById("fiche-animal");

          const nom = document.createElement("h2");
          nom.className = "fiche-animal-nom";
          nom.textContent = data[1];
          conteneur.appendChild(nom);

          //AGE
          const age = document.createElement("h2");
          age.className = "fiche-animal-age";
          age.textContent = data[2];
          conteneur.appendChild(age);
          //ESPECE
          const espece = document.createElement("h2");
          espece.className = "fiche-animal-espece";
          espece.textContent = data[3];
          conteneur.appendChild(espece);
          //IMAGE
          const image = document.createElement("img");
          image.className = "fiche-animal-image";
          image.src = data[4]; // URL de l'image
          conteneur.appendChild(image);

          //DANGER
          const label = document.createElement("label");
          label.className = "fiche-animal-danger";
          label.textContent = "Dangerosité: ";

          const progress = document.createElement("progress");
          progress.max = 5; // danger sur 5
          progress.value = data[7];
          label.appendChild(progress);
          conteneur.appendChild(label);

          if (data[7] <= 1) {
            progress.className = "faible";
          } else if (data[7] <= 2) {
            progress.className = "peu";
          } else if (data[7] <= 3) {
            progress.className = "moyen";
          } else {
            progress.className = "eleve";
          }

           const des = document.createElement("h2");
          des.className = "fiche-animal-description";
          des.textContent = data[5];
          conteneur.appendChild(des);
        }),
          //DESCRIPTION
        fetch(`/recup_propri_animal/${id}`)
        .then((response) => response.json())
        .then((data) =>{

          //PROPRIO
          const pro = document.createElement("h2");
          pro.className = "fiche-animal-proprietaire";
          pro.textContent = data[0];
          document.getElementById("fiche-animal").appendChild(pro);
        });


        //AFFICHE COMM
        fetch(`/recup_comm_animal/${id}`)
        .then((response) => response.json())
        .then((data) => {
          const listeComm = document.getElementById("liste-caracteristique");
          data.forEach((commentaire) => {
            const item = document.createElement("li");
            item.className = "commentaire-item";
            listeComm.appendChild(item);

            const comm = document.createElement("p");
            comm.className = "commentaire-texte";
            comm.textContent =  commentaire;
            item.appendChild(comm);

            const notation = document.createElement("p");
            notation.className = "commentaire-note";
            if (commentaire.note != null) notation.textContent = commentaire.note;
            item.appendChild(notation);

          });
        });

            //MOYENNE NOTE
        fetch(`/moyenne_animal/${id}`)
      .then(response => response.json())
      .then(data => {
        const moy = document.createElement("p");
        moy.className = "fiche-animal-moyenne";
        moy.textContent = `Moyenne des notes : ${data[0]}/5`;
        document.getElementById("fiche-animal").appendChild(moy);
      });
    </script>

    {% if 'nom_utilisateur' in session %}
    <form action="/animal/{{ id }}/commentaire" method="POST" class="formulaire formulaire-commentaire">
      <textarea name="commentaire" texte="Votre commentaire"></textarea>
      <input type="number" name="note" min="1" max="5" texte="Note /5" />
      <button type="submit" class="bouton bouton-principal">Envoyer</button>
    </form>
    {%endif%}
    </main>
  </body>
</html>
